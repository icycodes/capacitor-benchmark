<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipboard Demo</title>
  </head>
  <body>
    <main id="app">
      <h1>Clipboard Demo</h1>
      <div>
        <input id="clip-input" type="text" placeholder="Type something..." />
        <button id="clip-write-btn">Copy to Clipboard</button>
        <button id="clip-read-btn">Paste from Clipboard</button>
      </div>
      <div>
        <span id="clip-output"></span>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
