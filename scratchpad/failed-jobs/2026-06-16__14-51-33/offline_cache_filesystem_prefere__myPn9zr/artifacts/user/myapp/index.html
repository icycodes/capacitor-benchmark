<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Cache Demo</title>
  </head>
  <body>
    <main id="app">
      <h1>Offline Cache Demo</h1>
      <div>
        <label for="url-input">URL:</label>
        <input id="url-input" type="text" value="" />
      </div>
      <div>
        <button id="fetch-button">Fetch</button>
        <button id="invalidate-button">Invalidate</button>
      </div>
      <div>
        <p>Status: <span id="status">idle</span></p>
        <p>Data: <span id="data"></span></p>
        <p>Source: <span id="source"></span></p>
        <p>Meta ETag: <span id="meta-etag"></span></p>
        <p>Meta Fetched At: <span id="meta-fetched-at"></span></p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
